# Optional remote-admin gateway for a PowerMap client.
#
# Keep PowerMap itself on 127.0.0.1:8088. This virtual host terminates HTTPS,
# requires a client certificate, and only admits the listed source network.
# Replace every example hostname, certificate path, and IP range before use.
server {
    listen 443 ssl http2;
    server_name powermap-admin.example.com;

    ssl_certificate     /etc/letsencrypt/live/powermap-admin.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/powermap-admin.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;

    # Issue a client certificate from this CA only to trusted administrators.
    ssl_client_certificate /etc/nginx/powermap-admin-ca.pem;
    ssl_verify_client on;
    ssl_verify_depth 2;

    # Replace with the administrator's stable VPN, office, or home CIDR.
    allow 203.0.113.0/24;
    deny all;

    # Do not write request URIs to this vhost's access log. This also keeps
    # rejected legacy ?token= attempts out of a proxy log.
    access_log off;
    error_log /var/log/nginx/powermap-admin.error.log warn;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # These PowerMap endpoints deliberately bypass web_token. Do not make
    # their aggregate state externally discoverable through this gateway.
    location = /metrics { return 404; }
    location = /api/health { return 404; }

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # The PowerMap UI sends this after its in-memory web_token prompt.
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
