name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          # 从 tag 名生成 Release；正文自动取 CHANGELOG.md 对应版本段（若有）
          changelog: CHANGELOG.md
          # The action only supports drafts. A following step turns it into a prerelease, which
          # remains downloadable for smoke tests but stays out of GitHub's `latest` endpoint.
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Make the release testable but not latest
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --draft=false --prerelease

  upload-assets:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: powermap
          target: ${{ matrix.target }}
          # 归档名：powermap-<target>.tar.gz（Windows 为 .zip）
          archive: powermap-$target
          # 随包附带的文件（LICENSE* / README* 默认已含，这里显式列出更清晰）
          include: LICENSE-MIT,LICENSE-APACHE,README.md
          # 生成 .sha256 校验和
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  verify-release-assets:
    name: smoke test ${{ matrix.target }} release archive
    needs: upload-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_extension: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive_extension: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_extension: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_extension: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_extension: zip
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Download uploaded archive and checksum
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          EXTENSION: ${{ matrix.archive_extension }}
        shell: bash
        run: |
          mkdir dist
          gh release download "$TAG" \
            --repo "$GH_REPO" \
            --pattern "powermap-${TARGET}.${EXTENSION}" \
            --pattern "powermap-${TARGET}.sha256" \
            --dir dist

      - name: Verify checksum and execute help (Unix)
        if: runner.os != 'Windows'
        env:
          TARGET: ${{ matrix.target }}
          EXTENSION: ${{ matrix.archive_extension }}
        shell: bash
        run: |
          cd dist
          shasum -a 256 -c "powermap-${TARGET}.sha256"
          mkdir unpacked
          tar -xzf "powermap-${TARGET}.${EXTENSION}" -C unpacked
          if [ "$TARGET" = "aarch64-unknown-linux-gnu" ]; then
            # GitHub's Ubuntu hosted runner is x86_64, so it cannot execute
            # the ARM64 Linux binary. Check its presence after extraction;
            # native execution is covered by the ARM64 release target build.
            test -x ./unpacked/powermap
          else
            ./unpacked/powermap --help
          fi

      - name: Verify checksum and execute help (Windows)
        if: runner.os == 'Windows'
        env:
          TARGET: ${{ matrix.target }}
          EXTENSION: ${{ matrix.archive_extension }}
        shell: pwsh
        run: |
          $archive = "dist/powermap-$env:TARGET.$env:EXTENSION"
          $checksum = (Get-Content "dist/powermap-$env:TARGET.sha256" -Raw).Trim().Split()[0]
          $actual = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $checksum.ToLowerInvariant()) {
            throw "SHA-256 mismatch for $archive"
          }
          Expand-Archive -Path $archive -DestinationPath dist/unpacked
          & dist/unpacked/powermap.exe --help
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  publish-docker:
    name: publish Docker image
    needs: verify-release-assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/powermap:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/powermap:latest
      - name: Make the public image pullable without credentials
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method PATCH /user/packages/container/powermap -f visibility=public

  publish-release:
    name: publish verified release
    needs: publish-docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease=false
