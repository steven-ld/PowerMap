name: 功能请求 / Feature request
description: 提议一个新功能或改进 / Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / Problem
      description: 你遇到的实际场景或痛点是什么？/ What real-world situation or pain point is this about?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 设想的方案 / Proposed solution
      description: 你希望它怎么工作？/ How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / Alternatives
      description: 你考虑过的其他做法（可选）/ Other approaches you considered (optional)
    validations:
      required: false
